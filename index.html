<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rizawan ai | Premium Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 24px;
        }
        .btn-grad { 
            background: linear-gradient(135deg, #4f46e5, #9333ea); 
            transition: 0.3s; 
        }
        .btn-grad:hover { transform: scale(1.02); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass w-full max-w-md p-8 shadow-2xl text-center">
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold text-white">Rizawan ai</h1>
            <p class="text-indigo-400 text-sm font-medium tracking-wider uppercase mt-1">Professional Media Downloader</p>
        </div>

        <div class="relative mb-6">
            <i class="fa-solid fa-link absolute left-4 top-4 text-gray-500"></i>
            <input type="text" id="url" placeholder="Paste YouTube link..." 
                   class="w-full pl-12 pr-4 py-4 rounded-xl bg-black/40 border border-white/10 focus:outline-none focus:border-indigo-500 text-sm">
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <button onclick="download('video')" class="btn-grad p-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg">
                <i class="fa-solid fa-download"></i> Video
            </button>
            <button onclick="download('audio')" class="btn-grad p-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg">
                <i class="fa-solid fa-music"></i> Audio
            </button>
        </div>
        
        <div id="status" class="mt-8 text-xs text-gray-500">Ready for high-speed download</div>
    </div>

    <script>
        function download(type) {
            const url = document.getElementById('url').value;
            const status = document.getElementById('status');
            if(!url.includes('youtu')) {
                status.innerText = "⚠️ Please enter a valid YouTube link!";
                return;
            }
            status.innerText = "🚀 Processing request...";
            
            fetch('https://api.cobalt.tools/api/json', {
                method: 'POST',
                headers: {'Accept': 'application/json', 'Content-Type': 'application/json'},
                body: JSON.stringify({ url: url, isAudioOnly: type === 'audio' })
            })
            .then(res => res.json())
            .then(data => {
                if(data.url) {
                    window.open(data.url, '_blank');
                    status.innerText = "✅ Download starting now!";
                } else {
                    status.innerText = "❌ System busy, try again.";
                }
            })
            .catch(() => status.innerText = "❌ Error connecting to server.");
        }
    </script>
</body>
</html>
